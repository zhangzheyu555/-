name: codex-deepseek-assistant

services:
  gateway:
    image: nginx:${NGINX_IMAGE_TAG:-1.27-alpine}
    container_name: codex-deepseek-assistant-gateway
    restart: unless-stopped
    ports:
      - "${GATEWAY_HTTP_BIND_IP:-0.0.0.0}:${HTTP_PORT:-80}:80"
      - "${GATEWAY_HTTPS_BIND_IP:-0.0.0.0}:${HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/nginx-unified.conf:/etc/nginx/conf.d/default.conf:ro
      - ${OFFICIAL_SITE_ROOT:-./deploy/official-site}:/usr/share/nginx/official-site:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  frontend:
    build:
      context: ./frontend-vue
      args:
        VITE_PUBLIC_BASE: ${VITE_PUBLIC_BASE:-/admin/}
    image: codex-deepseek-assistant-frontend:${FRONTEND_IMAGE_TAG:-local}
    container_name: codex-deepseek-assistant-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_BIND_IP:-127.0.0.1}:${FRONTEND_PORT:-5173}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./backend
    image: codex-deepseek-assistant-backend:${BACKEND_IMAGE_TAG:-local}
    container_name: codex-deepseek-assistant-backend
    restart: unless-stopped
    environment:
      SERVER_PORT: 8080
      APP_ENV: ${APP_ENV:-QA}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-store_profit_qa}
      MYSQL_USERNAME: ${MYSQL_USERNAME:-${MYSQL_APP_USER:-store_profit_app}}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-${MYSQL_APP_PASSWORD:-store_profit_app}}
      MYSQL_ALLOW_PUBLIC_KEY_RETRIEVAL: ${MYSQL_ALLOW_PUBLIC_KEY_RETRIEVAL:-true}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-store_profit_redis}
      INSPECTION_DETECT_URL: http://inspection-service:8000/detect
      INSPECTION_EXPORT_URL: http://inspection-service:8000/export
      APP_EXPENSE_SUPPLEMENT_STORAGE_ROOT: /app/expense-supplements
      APP_SEED_DEMO_ENABLED: ${APP_SEED_DEMO_ENABLED:-false}
      APP_BOOTSTRAP_DEFAULT_USERS_ENABLED: ${APP_BOOTSTRAP_DEFAULT_USERS_ENABLED:-false}
      APP_BOOTSTRAP_DEFAULT_USERS_PASSWORD: ${APP_BOOTSTRAP_DEFAULT_USERS_PASSWORD:-}
      APP_BOOTSTRAP_STORE_MANAGER_ACCOUNTS_ENABLED: ${APP_BOOTSTRAP_STORE_MANAGER_ACCOUNTS_ENABLED:-false}
      APP_BOOTSTRAP_STORE_MANAGER_PASSWORD: ${APP_BOOTSTRAP_STORE_MANAGER_PASSWORD:-}
      # 门店经营助手（DeepSeek）。APP_ENV=PRODUCTION 且 OUTBOUND_MODE=LIVE 时即可真实出网；
      # 若 APP_ENV=QA 需另外显式开启 DEEPSEEK_EXTERNAL_PILOT_ENABLED=true 与 DEEPSEEK_QUESTION_ONLY=true。
      DEEPSEEK_ENABLED: ${DEEPSEEK_ENABLED:-false}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_OUTBOUND_MODE: ${DEEPSEEK_OUTBOUND_MODE:-LIVE}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      DEEPSEEK_FAST_MODEL: ${DEEPSEEK_FAST_MODEL:-deepseek-chat}
      # 员工服务助手：MODEL 模式独立接入 DeepSeek（绝不复用上面的 DEEPSEEK_* 变量）。
      # ASSISTANT_RUNTIME_SECURED 必须为 true，否则后端视为未通过安全启动器注入而拒绝就绪。
      EMPLOYEE_ASSISTANT_PROVIDER: ${EMPLOYEE_ASSISTANT_PROVIDER:-}
      EMPLOYEE_ASSISTANT_MODEL_URL: ${EMPLOYEE_ASSISTANT_MODEL_URL:-https://api.deepseek.com}
      EMPLOYEE_ASSISTANT_MODEL_API_KEY: ${EMPLOYEE_ASSISTANT_MODEL_API_KEY:-}
      EMPLOYEE_ASSISTANT_MODEL_NAME: ${EMPLOYEE_ASSISTANT_MODEL_NAME:-deepseek-chat}
      EMPLOYEE_ASSISTANT_OUTBOUND_MODE: ${EMPLOYEE_ASSISTANT_OUTBOUND_MODE:-LIVE}
      ASSISTANT_RUNTIME_SECURED: ${ASSISTANT_RUNTIME_SECURED:-false}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:*,http://127.0.0.1:*}
      TZ: Asia/Shanghai
    ports:
      - "${BACKEND_BIND_IP:-127.0.0.1}:${BACKEND_PORT:-${SERVER_PORT:-8080}}:8080"
    volumes:
      - backend-expense-supplements:/app/expense-supplements
    depends_on:
      mysql:
        condition: service_healthy
      inspection-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/api/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 60s

  inspection-service:
    build:
      context: ./inspection-service
    image: codex-deepseek-assistant-inspection-service:${INSPECTION_IMAGE_TAG:-local}
    container_name: codex-deepseek-assistant-inspection-service
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      YOLO_CONFIG_DIR: /tmp/Ultralytics
    ports:
      - "${INSPECTION_BIND_IP:-127.0.0.1}:${INSPECTION_PORT:-8000}:8000"
    volumes:
      - inspection-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  mysql:
    image: mysql:${MYSQL_IMAGE_TAG:-8.4}
    container_name: codex-deepseek-assistant-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-store_profit_root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-store_profit_qa}
      MYSQL_USER: ${MYSQL_USERNAME:-${MYSQL_APP_USER:-store_profit_app}}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-${MYSQL_APP_PASSWORD:-store_profit_app}}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    ports:
      - "${MYSQL_BIND_IP:-127.0.0.1}:${MYSQL_HOST_PORT:-${MYSQL_PORT:-3306}}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:${REDIS_IMAGE_TAG:-8}
    container_name: codex-deepseek-assistant-redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-store_profit_redis}
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-store_profit_redis}"]
    ports:
      - "${REDIS_BIND_IP:-127.0.0.1}:${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD:-store_profit_redis}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  postgres:
    image: postgres:${POSTGRES_IMAGE_TAG:-17}
    container_name: codex-deepseek-assistant-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-store_profit_aux}
      POSTGRES_USER: ${POSTGRES_USER:-store_profit_pg}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-store_profit_pg}
      TZ: Asia/Shanghai
      PGTZ: Asia/Shanghai
    ports:
      - "${POSTGRES_BIND_IP:-127.0.0.1}:${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  backend-expense-supplements:
  inspection-data:
  mysql-data:
  redis-data:
  postgres-data:
