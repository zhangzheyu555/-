server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: store-profit-backend
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:store_profit}?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

app:
  cors:
    allowed-origin-patterns:
      - "http://localhost:*"
      - "http://127.0.0.1:*"
      - "file://*"
  assistant:
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:}
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
      model: ${DEEPSEEK_MODEL:deepseek-v4-flash}
      max-tokens: ${DEEPSEEK_MAX_TOKENS:800}
      temperature: ${DEEPSEEK_TEMPERATURE:0.2}
      timeout: ${DEEPSEEK_TIMEOUT:30s}
      blocked-words:
        - 赌博
        - 博彩
        - 色情
        - 黄色
        - 毒品
        - 黑客
        - 攻击
        - 破解
        - 木马
        - 病毒
        - 脱库
        - 撞库
        - 身份证号
        - 银行卡
        - 密钥
        - 令牌
        - api key
        - apikey
        - access token

logging:
  level:
    com.storeprofit.system: INFO
