server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: store-profit-backend
  web:
    resources:
      cache:
        cachecontrol:
          no-cache: true
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:store_profit}?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB

app:
  version: 0.5.0-phase5-admin-export
  inspection:
    detect-url: ${INSPECTION_DETECT_URL:http://127.0.0.1:8000/detect}
    timeout: ${INSPECTION_TIMEOUT:60s}
  auth:
    token-ttl-hours: 12
  cors:
    allowed-origin-patterns:
      - "http://localhost:*"
      - "http://127.0.0.1:*"
      - "file://*"
      # 双击 HTML 用 file:// 打开时浏览器发送的 Origin 是字面量 "null"
      - "null"
  assistant:
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:}
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
      model: ${DEEPSEEK_MODEL:deepseek-chat}
      max-tokens: ${DEEPSEEK_MAX_TOKENS:800}
      temperature: ${DEEPSEEK_TEMPERATURE:0.2}
      timeout: ${DEEPSEEK_TIMEOUT:30s}
      blocked-words:
        - 赌博
        - 博彩
        - 色情
        - 黄色
        - 毒品
        - 黑客
        - 攻击
        - 破解
        - 木马
        - 病毒
        - 脱库
        - 撞库
        - 身份证号
        - 银行卡
        - 密钥
        - 令牌
        - api key
        - apikey
        - access token

logging:
  level:
    com.storeprofit.system: INFO
