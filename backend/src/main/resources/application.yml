server:
  port: ${SERVER_PORT:8080}
  compression:
    enabled: true
    min-response-size: 1KB
    mime-types:
      - text/html
      - text/xml
      - text/plain
      - text/javascript
      - text/css
      - application/javascript
      - application/json

spring:
  application:
    name: store-profit-backend
  web:
    resources:
      cache:
        cachecontrol:
          no-cache: true
          must-revalidate: true
  datasource:
    url: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/${MYSQL_DATABASE}?createDatabaseIfNotExist=false&useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&sslMode=${MYSQL_SSL_MODE:DISABLED}&allowPublicKeyRetrieval=true&connectTimeout=2000&socketTimeout=2000
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 2000
      validation-timeout: 1000
      initialization-fail-timeout: 2000
      connection-init-sql: SET NAMES utf8mb4 COLLATE utf8mb4_unicode_ci
  flyway:
    enabled: true
    locations: classpath:db/migration
    encoding: UTF-8
    baseline-on-migrate: false
    out-of-order: false
    clean-disabled: true
    validate-on-migrate: true
    validate-migration-naming: true
    table: flyway_schema_history
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 65MB

app:
  environment: ${APP_ENV}
  version: 0.5.0-phase5-admin-export
  seed:
    demo-enabled: ${APP_SEED_DEMO_ENABLED:false}
    legacy-employee-enabled: ${APP_SEED_LEGACY_EMPLOYEE_ENABLED:false}
    legacy-employee-file: ${APP_SEED_LEGACY_EMPLOYEE_FILE:}
  migration:
    auto-run: ${APP_MIGRATION_AUTO_RUN:false}
  inspection:
    detect-url: ${INSPECTION_DETECT_URL:http://127.0.0.1:8000/detect}
    export-url: ${INSPECTION_EXPORT_URL:http://127.0.0.1:8000/export}
    timeout: ${INSPECTION_TIMEOUT:60s}
  eleme:
    app-key: ${ELEME_APP_KEY:}
    app-secret: ${ELEME_APP_SECRET:}
    access-token: ${ELEME_ACCESS_TOKEN:}
    base-url: ${ELEME_BASE_URL:https://api-be.ele.me/}
    timeout: ${ELEME_TIMEOUT:20s}
    # 已授权门店（shopId:门店名），逗号分隔；留空时接口返回未配置状态，不生成示例营业数据
    shops: ${ELEME_SHOPS:}
    # 回调默认关闭。仅在平台/网关契约确认后，显式设置 HMAC_SHA256_BODY 和独立密钥。
    webhook-secret: ${ELEME_WEBHOOK_SECRET:}
    webhook-signature-mode: ${ELEME_WEBHOOK_SIGNATURE_MODE:DISABLED}
    webhook-signature-header: ${ELEME_WEBHOOK_SIGNATURE_HEADER:X-Eleme-Signature}
    webhook-event-id-header: ${ELEME_WEBHOOK_EVENT_ID_HEADER:X-Eleme-Event-Id}
    webhook-max-payload-bytes: ${ELEME_WEBHOOK_MAX_PAYLOAD_BYTES:1048576}
  qmai:
    # 企迈开放平台凭证：只在后端注入，禁止写入前端与仓库。留空时接口返回未配置状态，不生成示例数据。
    open-id: ${QMAI_OPEN_ID:}
    grant-code: ${QMAI_GRANT_CODE:}
    open-key: ${QMAI_OPEN_KEY:}
    base-url: ${QMAI_BASE_URL:https://openapi.qmai.cn}
    version: ${QMAI_VERSION:1.0}
    timeout: ${QMAI_TIMEOUT:20s}
    # 已授权门店（shopCode:门店名:本系统storeId），逗号分隔
    shops: ${QMAI_SHOPS:}
  auth:
    token-ttl-hours: 12
  wechat-mini-program:
    # 仅后端读取；请在部署密钥系统注入，绝不提交 AppSecret 或发送到小程序。
    app-id: ${WECHAT_MINI_PROGRAM_APP_ID:}
    app-secret: ${WECHAT_MINI_PROGRAM_APP_SECRET:}
    base-url: ${WECHAT_MINI_PROGRAM_BASE_URL:https://api.weixin.qq.com}
  training:
    video-playback-ticket-ttl-seconds: ${TRAINING_VIDEO_PLAYBACK_TICKET_TTL_SECONDS:1800}
    # 开发和单实例默认使用本地短期票据。预发布/生产多实例必须显式开启，并且
    # 只允许通过标准 Spring Redis 环境变量（例如 SPRING_DATA_REDIS_HOST）连接共享存储。
    # 开启后 Redis 未配置或不可连接会拒绝应用启动，绝不回退到本地内存。
    require-shared-video-tickets: ${MOBILE_REQUIRE_SHARED_VIDEO_TICKETS:false}
  mobile:
    version:
      android:
        current-version: ${MOBILE_ANDROID_CURRENT_VERSION:0.1.0}
        minimum-version: ${MOBILE_ANDROID_MINIMUM_VERSION:0.1.0}
        update-available: ${MOBILE_ANDROID_UPDATE_AVAILABLE:false}
        force-update: ${MOBILE_ANDROID_FORCE_UPDATE:false}
        download-url: ${MOBILE_ANDROID_DOWNLOAD_URL:}
        message: ${MOBILE_ANDROID_UPDATE_MESSAGE:当前已是可用版本}
      ios:
        current-version: ${MOBILE_IOS_CURRENT_VERSION:0.1.0}
        minimum-version: ${MOBILE_IOS_MINIMUM_VERSION:0.1.0}
        update-available: ${MOBILE_IOS_UPDATE_AVAILABLE:false}
        force-update: ${MOBILE_IOS_FORCE_UPDATE:false}
        download-url: ${MOBILE_IOS_DOWNLOAD_URL:}
        message: ${MOBILE_IOS_UPDATE_MESSAGE:当前已是可用版本}
  storage:
    expense-supplements-root: ${APP_EXPENSE_SUPPLEMENT_STORAGE_ROOT:./expense-supplements}
  exception:
    # 经营异常阈值可通过环境同名配置覆盖，不在前端写死。
    cost-ratio-threshold: ${APP_EXCEPTION_COST_RATIO_THRESHOLD:0.45}
    revenue-decline-threshold: ${APP_EXCEPTION_REVENUE_DECLINE_THRESHOLD:0.20}
    auto-reconcile-enabled: ${APP_EXCEPTION_AUTO_RECONCILE_ENABLED:true}
    auto-reconcile-initial-delay-ms: ${APP_EXCEPTION_AUTO_RECONCILE_INITIAL_DELAY_MS:60000}
    auto-reconcile-delay-ms: ${APP_EXCEPTION_AUTO_RECONCILE_DELAY_MS:3600000}
  exam:
    risk-completion-rate: ${APP_EXAM_RISK_COMPLETION_RATE:80}
    risk-pass-rate: ${APP_EXAM_RISK_PASS_RATE:80}
    risk-overdue-count: ${APP_EXAM_RISK_OVERDUE_COUNT:3}
    risk-average-score: ${APP_EXAM_RISK_AVERAGE_SCORE:70}
  cors:
    # 用环境变量 APP_CORS_ALLOWED_ORIGINS 覆盖(逗号分隔), 不设置则用默认值
    # 这样换 IP/域名只改 .env, 不用重新打包 jar
    allowed-origin-patterns: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*}
  assistant:
    deepseek:
      enabled: ${DEEPSEEK_ENABLED:true}
      api-key: ${DEEPSEEK_API_KEY:}
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
      model: ${DEEPSEEK_MODEL:deepseek-v4-flash}
      # 自动模式始终走快速模型；显式“深度分析”仍使用上面的 DEEPSEEK_MODEL。
      fast-model: ${DEEPSEEK_FAST_MODEL:deepseek-v4-flash}
      max-tokens: ${DEEPSEEK_MAX_TOKENS:1200}
      fast-max-tokens: ${DEEPSEEK_FAST_MAX_TOKENS:700}
      temperature: ${DEEPSEEK_TEMPERATURE:0.2}
      connect-timeout: ${DEEPSEEK_CONNECT_TIMEOUT:5s}
      timeout: ${DEEPSEEK_TIMEOUT_SECONDS:45}s
      # 一次经营分析（含最多一次结构修复）的总耗时上限；单次请求仍使用 timeout。
      analysis-timeout: ${DEEPSEEK_ANALYSIS_TIMEOUT:30s}
      max-requests-per-minute: ${DEEPSEEK_MAX_REQUESTS_PER_MINUTE:30}
      circuit-failure-threshold: ${DEEPSEEK_CIRCUIT_FAILURE_THRESHOLD:3}
      circuit-open-duration: ${DEEPSEEK_CIRCUIT_OPEN_DURATION:30s}
      blocked-words:
        - 赌博
        - 博彩
        - 色情
        - 黄色
        - 毒品
        - 黑客
        - 攻击
        - 破解
        - 木马
        - 病毒
        - 脱库
        - 撞库
        - 身份证号
        - 银行卡
        - 密钥
        - 令牌
        - api key
        - apikey
        - access token
  employee-assistant:
    # 留空即为未配置；生产环境不提供 localhost 或任何默认上游地址。
    upstream-url: ${EMPLOYEE_ASSISTANT_URL:}
    api-token: ${EMPLOYEE_ASSISTANT_API_TOKEN:}
    # 生产启动时会进一步钳制为连接 2-3 秒、总请求 8-10 秒，避免慢上游占用员工操作。
    connect-timeout: ${EMPLOYEE_ASSISTANT_CONNECT_TIMEOUT:3s}
    timeout: ${EMPLOYEE_ASSISTANT_TIMEOUT:10s}
    # REMOTE 为独立员工助手上游；MODEL 仅使用下列独立员工模型变量，绝不复用 DEEPSEEK_*。
    provider: ${EMPLOYEE_ASSISTANT_PROVIDER:}
    model-url: ${EMPLOYEE_ASSISTANT_MODEL_URL:}
    model-api-key: ${EMPLOYEE_ASSISTANT_MODEL_API_KEY:}
    model-name: ${EMPLOYEE_ASSISTANT_MODEL_NAME:}
    # 仅由统一安全启动器注入；手工 java -jar 不会设置此标记，员工助手将拒绝就绪。
    runtime-secured: ${ASSISTANT_RUNTIME_SECURED:false}

logging:
  level:
    com.storeprofit.system: INFO
