# QA is deliberately opt-in through SPRING_PROFILES_ACTIVE=qa. Database connection
# values remain environment-only; this file must never contain credentials or a real URL.
server:
  tomcat:
    # Playback tickets travel in the video stream query string; QA must not emit access-log URLs.
    accesslog:
      enabled: false

app:
  environment: QA
  inspection:
    detect-url: ${INSPECTION_DETECT_URL:http://127.0.0.1:19090/detect}
    export-url: ${INSPECTION_EXPORT_URL:http://127.0.0.1:19090/export}
    outbound-mode: ${INSPECTION_OUTBOUND_MODE:DISABLED}
  seed:
    demo-enabled: false
    legacy-employee-enabled: false
  assistant:
    deepseek:
      enabled: ${DEEPSEEK_ENABLED:false}
      outbound-mode: ${DEEPSEEK_OUTBOUND_MODE:DISABLED}
      external-pilot-enabled: ${DEEPSEEK_EXTERNAL_PILOT_ENABLED:false}
      question-only: ${DEEPSEEK_QUESTION_ONLY:false}
  employee-assistant:
    # QA normal-state evidence uses the deterministic in-process responder. It has no URL,
    # credential or model dependency and cannot initiate an outbound request.
    provider: LOCAL
    outbound-mode: DISABLED
    upstream-url: ""
    api-token: ""
    model-url: ""
    model-api-key: ""
  qmai:
    recipe-enabled: false

spring:
  mvc:
    # Do not include request parameters or headers in framework diagnostics.
    log-request-details: false
  flyway:
    baseline-on-migrate: false
    clean-disabled: true
    out-of-order: false
    validate-on-migrate: true
  main:
    banner-mode: "off"
