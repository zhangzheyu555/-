# 本地开发一键部署：从源码构建全部服务（不包含微信小程序）。
# 启动：docker compose -f docker-compose.dev.next.yml up -d --build
name: ai-profit-os-dev-next

services:
  gateway:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:${DEV_GATEWAY_PORT:-8088}:80"
    volumes:
      - ./deploy/nginx-development.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/official-site:/usr/share/nginx/official-site:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend-vue
      dockerfile: Dockerfile.dev
      args:
        VITE_PUBLIC_BASE: /admin/
    image: ai-profit-os-dev-frontend:local
    restart: unless-stopped
    ports:
      - "127.0.0.1:${DEV_FRONTEND_PORT:-5173}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    image: ai-profit-os-dev-backend:local
    restart: unless-stopped
    environment:
      SERVER_PORT: 8080
      APP_ENV: QA
      SPRING_PROFILES_ACTIVE: qa
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ai_profit_dev_qa
      MYSQL_USERNAME: ai_profit_dev_app
      MYSQL_PASSWORD: ${DEV_MYSQL_APP_PASSWORD:-ai_profit_dev_app}
      MYSQL_ALLOW_PUBLIC_KEY_RETRIEVAL: "true"
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${DEV_REDIS_PASSWORD:-ai_profit_dev_redis}
      INSPECTION_DETECT_URL: http://inspection-service:8000/detect
      INSPECTION_EXPORT_URL: http://inspection-service:8000/export
      APP_EXPENSE_SUPPLEMENT_STORAGE_ROOT: /app/expense-supplements
      APP_SEED_DEMO_ENABLED: "false"
      APP_BOOTSTRAP_DEFAULT_USERS_ENABLED: "false"
      APP_BOOTSTRAP_STORE_MANAGER_ACCOUNTS_ENABLED: "false"
      DEEPSEEK_ENABLED: "false"
      APP_CORS_ALLOWED_ORIGINS: http://localhost:${DEV_GATEWAY_PORT:-8088},http://127.0.0.1:${DEV_GATEWAY_PORT:-8088},http://localhost:${DEV_FRONTEND_PORT:-5173},http://127.0.0.1:${DEV_FRONTEND_PORT:-5173}
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:${DEV_BACKEND_PORT:-8080}:8080"
    volumes:
      - development-expense-supplements:/app/expense-supplements
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      inspection-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/api/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 60s

  inspection-service:
    build:
      context: ./inspection-service
    image: ai-profit-os-dev-inspection-service:local
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      YOLO_CONFIG_DIR: /tmp/Ultralytics
    ports:
      - "127.0.0.1:${DEV_INSPECTION_PORT:-8000}:8000"
    volumes:
      - development-inspection-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DEV_MYSQL_ROOT_PASSWORD:-ai_profit_dev_root}
      MYSQL_DATABASE: ai_profit_dev_qa
      MYSQL_USER: ai_profit_dev_app
      MYSQL_PASSWORD: ${DEV_MYSQL_APP_PASSWORD:-ai_profit_dev_app}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    ports:
      - "127.0.0.1:${DEV_MYSQL_PORT:-3306}:3306"
    volumes:
      - development-mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:8
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${DEV_REDIS_PASSWORD:-ai_profit_dev_redis}
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${DEV_REDIS_PASSWORD:-ai_profit_dev_redis}"]
    ports:
      - "127.0.0.1:${DEV_REDIS_PORT:-6379}:6379"
    volumes:
      - development-redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai_profit_dev_aux
      POSTGRES_USER: ai_profit_dev_pg
      POSTGRES_PASSWORD: ${DEV_POSTGRES_PASSWORD:-ai_profit_dev_pg}
      TZ: Asia/Shanghai
      PGTZ: Asia/Shanghai
    ports:
      - "127.0.0.1:${DEV_POSTGRES_PORT:-5432}:5432"
    volumes:
      - development-postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  development-expense-supplements:
  development-inspection-data:
  development-mysql-data:
  development-redis-data:
  development-postgres-data:
