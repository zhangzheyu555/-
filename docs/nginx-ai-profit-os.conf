# Historical compatibility template. Do not use this file for Vue3 production deployment.
# Use docs/nginx-vue3-ai-profit-os.conf or docs/nginx-production-ai-profit-os.conf instead.
server {
    listen 18080;
    server_name _;

    root /opt/store-profit/frontend;
    index index.html;

    # Backend API: Spring Boot keeps listening on local port 8080.
    # This location must stay before the frontend fallback.
    location /api/ {
        proxy_pass http://127.0.0.1:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Main frontend files. Keep no-cache while the product is changing quickly.
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files /index.html =404;
    }

    location = /database.js {
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files /database.js =404;
    }

    location = /cloudbase.full.js {
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files /cloudbase.full.js =404;
    }

    # Frontend route fallback. It must not catch /api/** because /api/ is handled above.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }
}
