server {
    listen 18080;
    server_name _;

    root /opt/store-profit/frontend;
    index index.html;
    server_tokens off;
    client_max_body_size 20m;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Spring Boot API.
    location /api/ {
        proxy_pass http://127.0.0.1:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Legacy HTML fallback. Keep it available, but do not make it the default entry.
    location /legacy/ {
        alias /opt/store-profit/legacy-frontend/;
        try_files $uri $uri/ /legacy/index.html;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    location = /index.html {
        try_files /index.html =404;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=300" always;
    }

    # Vue history routing. Direct refresh of /boss, /finance, /warehouse,
    # /inspection, /operations and /todos must all return the Vue app.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }
}
