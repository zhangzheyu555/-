# ============================================================
# 门店利润系统 · 部署总门（nginx 反向代理 + 登录门）
# 作用：把整个站点挡在一道登录门后面，外网陌生人进不来，
#       从而堵住 /api/storage 无鉴权、账号密码明文等一系列洞。
# 用法见同目录 README.md。
# ============================================================

# 后端 Spring Boot（本机 8080）。若后端在别的机器/端口，改这里。
upstream storeprofit_backend {
    server 127.0.0.1:8080;
}

server {
    listen 80;
    server_name _;          # 换成你的域名，如 profit.example.com

    # —— 上传大小上限 ——
    # Spring multipart 上限是 25MB，nginx 默认只有 1MB，会把店长传的大图挡成 413。
    # 放到 30MB 留点余量（比后端略大即可）。
    client_max_body_size 30m;

    # —— 一道总门：整站 HTTP Basic Auth ——
    # 所有请求都要先过这道门。密码文件见 README 第 2 步。
    auth_basic           "门店利润系统 · 请先登录";
    auth_basic_user_file /etc/nginx/storeprofit.htpasswd;

    location / {
        proxy_pass         http://storeprofit_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # 识别接口（/api/inspections/detect）单次可能跑 10~20 秒，
        # 后端识别超时是 60s，这里给到 120s，别让 nginx 提前掐断。
        proxy_connect_timeout 10s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;
    }
}

