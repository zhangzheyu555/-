server {
  listen 8080;
  server_name _;
  default_type application/json;

  location = /healthz {
    default_type text/plain;
    return 200 'ok\n';
  }

  # Local QA fixture only.  The backend still signs and sends its normal request;
  # this isolated endpoint returns deterministic, non-sensitive responses.
  location = /v3/org/shop/getShopList {
    return 200 '{"success":true,"code":0,"data":{"list":[{"id":"910001","name":"E2E QA Mock Store A"},{"id":"910002","name":"E2E QA Mock Store B"}]}}';
  }

  location = /v3/dataone/item/store/turnover {
    return 200 '{"success":true,"code":0,"data":{"resultList":[{"storeName":"E2E QA Mock Store","name":"E2E Mock Drink","categoryName":"E2E QA","num":3,"receivedAmount":36.50,"receivableAmount":39.00,"costAmount":12.00,"refundAmount":0,"refundNum":0}]}}';
  }

  location / {
    return 404 '{"success":false,"code":404,"message":"local QA QMAI mock route not found"}';
  }
}
