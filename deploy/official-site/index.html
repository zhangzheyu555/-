<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>官网待部署</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #1f2937;
        background: #f8fafc;
      }
      main {
        width: min(560px, calc(100vw - 48px));
        padding: 32px;
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        box-shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
      }
      h1 {
        margin: 0 0 12px;
        font-size: 24px;
      }
      p {
        margin: 0;
        line-height: 1.7;
        color: #4b5563;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>官网静态目录已就绪</h1>
      <p>将官网构建产物放入 deploy/official-site，或在 .env 中把 OFFICIAL_SITE_ROOT 指向官网 dist 目录。</p>
    </main>
  </body>
</html>
