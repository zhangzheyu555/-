# 生产环境统一网关配置
# - 80 端口: 永久跳转到 443(HTTPS)
# - 443 端口: HTTPS + 路由分发(/admin 前端, /api 后端, / 官网)

map $http_x_forwarded_proto $ai_profit_forwarded_proto {
    default $http_x_forwarded_proto;
    "" $scheme;
}

upstream ai_profit_frontend {
    server frontend:80;
}

upstream ai_profit_backend {
    server backend:8080;
}

# HTTP -> HTTPS 跳转
server {
    listen 80;
    server_name ruguotea.cn www.ruguotea.cn;

    # 健康检查仍保留在 80, 方便云监控探活
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # 其余请求全部跳转到 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 主服务
server {
    listen 443 ssl;
    http2 on;
    server_name ruguotea.cn www.ruguotea.cn;

    # SSL 证书(从宿主机 ./ssl 挂载进容器)
    ssl_certificate     /etc/nginx/ssl/ruguotea.cn_bundle.crt;
    ssl_certificate_key /etc/nginx/ssl/ruguotea.cn.key;

    # 安全的 SSL 配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # 安全响应头
    add_header Strict-Transport-Security "max-age=31536000" always;

    client_max_body_size 65m;

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location = /admin {
        return 301 /admin/;
    }

    location /admin/ {
        proxy_pass http://ai_profit_frontend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $ai_profit_forwarded_proto;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location /api/ {
        proxy_pass http://ai_profit_backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $ai_profit_forwarded_proto;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location /train-img/ {
        proxy_pass http://ai_profit_backend/train-img/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $ai_profit_forwarded_proto;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location / {
        root /usr/share/nginx/official-site;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
