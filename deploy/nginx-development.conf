# 本地开发网关：不加载 TLS 证书，不跳转 HTTPS。
upstream development_frontend {
    server frontend:80;
}

upstream development_backend {
    server backend:8080;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 65m;

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location = /admin {
        return 301 /admin/;
    }

    location /admin/ {
        proxy_pass http://development_frontend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://development_backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /train-img/ {
        proxy_pass http://development_backend/train-img/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        root /usr/share/nginx/official-site;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
