server {
    listen 80;
    server_name _;
    client_max_body_size 30m;

    # Docker service IPs change whenever a container is recreated.  Resolve
    # through Docker DNS at request time so the gateway cannot retain a stale
    # backend/frontend address after a QA restart.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $development_backend backend;
    set $development_frontend frontend;

    location = /healthz {
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location /api/ {
        proxy_pass http://$development_backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    location /train-img/ {
        proxy_pass http://$development_backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        # `proxy_pass` with a runtime-resolved upstream does not strip the
        # matching location prefix.  Remove `/admin/` explicitly so Vite's
        # `/admin/assets/...` URLs resolve to the frontend container's
        # `/assets/...` files instead of its SPA fallback HTML.
        rewrite ^/admin/(.*)$ /$1 break;
        proxy_pass http://$development_frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://$development_frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
