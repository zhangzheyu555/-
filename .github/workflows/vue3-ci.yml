name: Release CI

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      run_e2e_smoke:
        description: "Run the read-only role and permission smoke suite against a controlled environment."
        required: false
        type: boolean
        default: false
      e2e_base_url:
        description: "Vue base URL for the controlled E2E environment."
        required: false
        type: string
      e2e_api_url:
        description: "Backend base URL for the controlled E2E environment."
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: release-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  source-hygiene:
    name: Source hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reject whitespace errors in the changed range
        env:
          CI_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          CI_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: bash .github/scripts/check-diff.sh

      - name: Verify release source completeness and backup exclusions
        run: bash .github/scripts/verify-release-source.sh

  dependency-review:
    name: Dependency change review
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Reject high-severity dependency changes
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  backend:
    name: Backend tests and package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run backend tests
        working-directory: backend
        run: mvn -B -ntp test

      - name: Package backend
        working-directory: backend
        run: mvn -B -ntp -DskipTests package

      - name: Upload backend package for MySQL migration verification
        uses: actions/upload-artifact@v4
        with:
          name: backend-package
          path: backend/target/store-profit-backend-*.jar
          if-no-files-found: error
          retention-days: 3

  frontend:
    name: Vue type check, audit and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-vue
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend-vue/package-lock.json
          registry-url: https://registry.npmjs.org

      - name: Install locked dependencies
        run: npm ci

      - name: Gate high-severity dependency advisories
        run: npm audit --audit-level=high --registry=https://registry.npmjs.org

      - name: Type-check Vue and TypeScript
        run: npx vue-tsc -b

      - name: Build Vue production bundle
        run: npm run build

  mobile-ui-regression:
    name: Mobile UI regression (mocked API)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-vue
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend-vue/package-lock.json

      - name: Install locked dependencies
        run: npm ci

      - name: Build Vue production bundle for mobile regression
        run: npm run build

      # These projects use Chromium for Android and WebKit for iPhone/iPad.
      # They intercept every API call, so this gate needs no staging secrets.
      - name: Install Chromium and WebKit runtimes
        run: npx playwright install --with-deps chromium webkit

      - name: Start built Vue preview
        shell: bash
        run: |
          npx vite preview --host 127.0.0.1 --port 4173 > "$RUNNER_TEMP/vite-mobile-preview.log" 2>&1 &
          for attempt in $(seq 1 30); do
            if curl --fail --silent --show-error http://127.0.0.1:4173/ >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat "$RUNNER_TEMP/vite-mobile-preview.log"
          exit 1

      - name: Run configured iPhone, Android and iPad mobile regression
        env:
          E2E_BASE_URL: http://127.0.0.1:4173
        run: npm run test:e2e:mobile

      - name: Upload mobile regression artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: mobile-ui-regression-artifacts
          path: frontend-vue/test-results
          if-no-files-found: ignore
          retention-days: 7

  mysql-flyway-smoke:
    name: MySQL 8 and Flyway startup smoke
    needs: backend
    runs-on: ubuntu-latest
    env:
      APP_ENV: TEST
      SERVER_PORT: "18080"
      MYSQL_HOST: 127.0.0.1
      MYSQL_PORT: "3307"
      MYSQL_DATABASE: store_profit_ci_test
      MYSQL_USERNAME: store_profit_ci
      MYSQL_PASSWORD: ${{ format('app-ci-{0}-{1}', github.run_id, github.run_attempt) }}
      APP_SEED_DEMO_ENABLED: "false"
      APP_SEED_LEGACY_EMPLOYEE_ENABLED: "false"
      APP_MIGRATION_AUTO_RUN: "false"
      DEEPSEEK_ENABLED: "false"
    services:
      mysql:
        image: mysql:8.0.46
        env:
          MYSQL_DATABASE: store_profit_ci_test
          MYSQL_USER: store_profit_ci
          MYSQL_PASSWORD: ${{ format('app-ci-{0}-{1}', github.run_id, github.run_attempt) }}
          MYSQL_ROOT_PASSWORD: ${{ format('root-ci-{0}-{1}', github.run_id, github.run_attempt) }}
        ports:
          # CI容器内部保留镜像默认端口；应用只连接宿主3307。
          - 3307:3306
        options: >-
          --health-cmd="mysqladmin ping --host=127.0.0.1 --silent"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=24
    steps:
      - name: Checkout migration verifier
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Download packaged backend
        uses: actions/download-artifact@v4
        with:
          name: backend-package
          path: artifacts/backend

      - name: Start application and verify Flyway on MySQL 8
        shell: bash
        env:
          MYSQL_CONTAINER_ID: ${{ job.services.mysql.id }}
        run: |
          BACKEND_JAR="$(find artifacts/backend -maxdepth 1 -type f -name '*.jar' -print -quit)"
          test -n "$BACKEND_JAR"
          bash .github/scripts/verify-mysql-flyway.sh "$BACKEND_JAR"

  controlled-e2e-smoke:
    name: Controlled read-only E2E smoke
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_e2e_smoke }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-vue
    env:
      E2E_BASE_URL: ${{ inputs.e2e_base_url }}
      E2E_API_URL: ${{ inputs.e2e_api_url }}
      E2E_BOSS_USERNAME: ${{ secrets.E2E_BOSS_USERNAME }}
      E2E_BOSS_PASSWORD: ${{ secrets.E2E_BOSS_PASSWORD }}
      E2E_FINANCE_USERNAME: ${{ secrets.E2E_FINANCE_USERNAME }}
      E2E_FINANCE_PASSWORD: ${{ secrets.E2E_FINANCE_PASSWORD }}
      E2E_WAREHOUSE_USERNAME: ${{ secrets.E2E_WAREHOUSE_USERNAME }}
      E2E_WAREHOUSE_PASSWORD: ${{ secrets.E2E_WAREHOUSE_PASSWORD }}
      E2E_LEARNER_USERNAME: ${{ secrets.E2E_LEARNER_USERNAME }}
      E2E_LEARNER_PASSWORD: ${{ secrets.E2E_LEARNER_PASSWORD }}
      E2E_OPERATIONS_USERNAME: ${{ secrets.E2E_OPERATIONS_USERNAME }}
      E2E_OPERATIONS_PASSWORD: ${{ secrets.E2E_OPERATIONS_PASSWORD }}
      E2E_STORE_USERNAME: ${{ secrets.E2E_STORE_USERNAME }}
      E2E_STORE_PASSWORD: ${{ secrets.E2E_STORE_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend-vue/package-lock.json

      - name: Validate controlled E2E inputs and secrets
        working-directory: .
        run: bash .github/scripts/validate-e2e-env.sh

      - name: Install locked dependencies
        run: npm ci

      # The smoke command runs every configured Playwright project, including
      # the iPhone/iPad WebKit profiles.  Installing only Chromium made a
      # dispatched release gate fail before it could exercise those profiles.
      - name: Install Chromium and WebKit runtimes
        run: npx playwright install --with-deps chromium webkit

      - name: Run read-only health, routing and permission smoke
        run: npm run test:e2e:smoke
