name: Vue3 CI

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      run_smoke:
        description: "Run Vue3 E2E smoke. Requires reachable E2E_BASE_URL and E2E_API_URL."
        required: false
        type: boolean
        default: false

jobs:
  vue3-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-vue

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend-vue/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Vue3
        run: npm run build

      - name: Run E2E smoke
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_smoke }}
        run: npm run test:e2e:smoke
